apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-create
spec:
  template:
    spec:
      containers:
      - name: mc
        image: minio/mc
        resources:
          limits:
            memory: "512Mi"
        command:
          - /bin/sh
          - -c
          - "mc alias set myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && mc mb myminio/test"
        restartPolicy: OnFailure
  backoffLimit: 4
