apiVersion: batch/v1
kind: Job
metadata:
  name: read-job
  namespace: default
  labels:
    app: read-job
spec:
  template:
    metadata:
      name: read-job
      labels:
        app: read-job
    spec:
      restartPolicy: Never
      containers:
      - name: read-job
        image: busybox
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: "512Mi"
            ephemeral-storage: "5Gi"
        command: ['sh']
        args:
        - -c
        - |
          for i in $(seq 1 12); do
            content=$(cat /data/minio/bar 2>/dev/null) && [ -n "$content" ] && exit 0
            echo "Attempt $i: /data/minio/bar not readable yet, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: /data/minio/bar is not readable after 60 seconds"
          exit 1
        volumeMounts:
        - name: data-vol
          mountPath: /data
      automountServiceAccountToken: false
      volumes:
      - name: data-vol
        persistentVolumeClaim:
          claimName: curvine-demo
