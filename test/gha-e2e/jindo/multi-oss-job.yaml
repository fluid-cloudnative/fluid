apiVersion: batch/v1
kind: Job
metadata:
  name: fluid-multi-oss-test
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: busybox
          image: registry-cn-hongkong.ack.aliyuncs.com/acs/smartdata:6.9.1-202509151826
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "5Gi"
          command: ["/bin/sh"]
          args:
          - -c
          - |
            set -eu
            for i in $(seq 1 48); do
              value_a="$(cat /data/bucketa/__OBJECT_KEY_A__ 2>/dev/null || true)"
              value_b="$(cat /data/bucketb/__OBJECT_KEY_B__ 2>/dev/null || true)"
              if test "$value_a" = "__EXPECTED_DATA_A__" && test "$value_b" = "__EXPECTED_DATA_B__"; then
                echo "verified both OSS mount paths from application pod"
                exit 0
              fi
              sleep 5
            done
            ls -al /data >&2 || true
            ls -al /data/bucketa >&2 || true
            ls -al /data/bucketb >&2 || true
            echo "bucket-a: ${value_a:-<empty>}" >&2
            echo "bucket-b: ${value_b:-<empty>}" >&2
            exit 1
          volumeMounts:
            - mountPath: /data
              name: fluid-vol
      automountServiceAccountToken: false
      volumes:
        - name: fluid-vol
          persistentVolumeClaim:
            claimName: jindo-multi-oss-demo
