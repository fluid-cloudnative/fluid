apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app: minio
    app.kubernetes.io/part-of: jindo-e2e-minio
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app: minio
    app.kubernetes.io/part-of: jindo-e2e-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  # This name uniquely identifies the Deployment
  name: minio
  labels:
    app: minio
    app.kubernetes.io/part-of: jindo-e2e-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
      app.kubernetes.io/part-of: jindo-e2e-minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        # Label is used as selector in the service.
        app: minio
        app.kubernetes.io/part-of: jindo-e2e-minio
    spec:
      hostname: mybucket
      subdomain: minio
      containers:
      - name: minio
        # Pulls the default Minio image from Docker Hub
        image: local/minio-e2e:latest
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: "512Mi"
        args:
        - server
        - /data
        startupProbe:
          tcpSocket:
            port: 9000
          initialDelaySeconds: 1
          periodSeconds: 3
        env:
        # Minio access key and secret key
        - name: MINIO_DOMAIN  # For enabling virtual host style S3 APIs.
          value: minio.default.svc.cluster.local
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        ports:
        - containerPort: 9000
      automountServiceAccountToken: false
---
