apiVersion: data.fluid.io/v1alpha1
kind: Dataset
metadata:
  name: scaledown-demo
spec:
  mounts:
    - mountPoint: https://downloads.apache.org/zookeeper/stable/
      name: zookeeper
---
apiVersion: data.fluid.io/v1alpha1
kind: AlluxioRuntime
metadata:
  name: scaledown-demo
spec:
  replicas: 2
  tieredstore:
    levels:
      - mediumtype: SSD
        path: /tmp/alluxio
        quota: 1Gi
        high: "0.95"
        low: "0.7"
