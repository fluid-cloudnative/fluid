apiVersion: batch/v1
kind: Job
metadata:
  name: read-before-scaledown
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: busybox
          image: busybox
          resources:
            limits:
              memory: "512Mi"
              ephemeral-storage: "5Gi"
          command: ["/bin/sh"]
          args:
          - -c
          - |
            set -ex
            content=$(cat /data/fixture.txt)
            [ "$content" = "fluid-alluxio-scaledown-e2e-fixture" ]
          volumeMounts:
            - mountPath: /data
              name: fluid-vol
      automountServiceAccountToken: false
      volumes:
        - name: fluid-vol
          persistentVolumeClaim:
            claimName: scaledown-demo
