apiVersion: v1
kind: Secret
metadata:
  name: scaledown-minio-secret
stringData:
  aws.accessKeyId: minioadmin
  aws.secretKey: minioadmin
---
apiVersion: v1
kind: Service
metadata:
  name: scaledown-minio
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app: scaledown-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaledown-minio
spec:
  selector:
    matchLabels:
      app: scaledown-minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: scaledown-minio
    spec:
      containers:
      - name: minio
        image: minio/minio
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: "512Mi"
        args:
        - server
        - /data
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        ports:
        - containerPort: 9000
      automountServiceAccountToken: false
